<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gop Gop Gop - Yousuf Edition</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        #gameContainer {
            position: relative;
            width: 100%;
            max-width: 500px;
            padding: 10px;
        }
        /* Cartoon Kitchen Theme Background Color */
        #gameArea {
            width: 100%;
            height: 300px;
            background: linear-gradient(to bottom, #ffdfba, #ffffba);
            position: relative;
            overflow: hidden;
            border: 6px solid #fff;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        /* Floor Design */
        #floor {
            width: 100%;
            height: 20px;
            background-color: #b07d62;
            position: absolute;
            bottom: 0;
            left: 0;
        }
        /* Main Character Yousuf (Emoji base for instant loading without image files) */
        #yousuf {
            width: 50px;
            height: 50px;
            font-size: 45px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: absolute;
            bottom: 20px;
            left: 50px;
            z-index: 10;
        }
        .jump-animation {
            animation: jump 0.55s cubic-bezier(0.25, 1, 0.5, 1);
        }
        /* Obstacle: Banana */
        #obstacle {
            width: 40px;
            height: 40px;
            font-size: 35px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: absolute;
            bottom: 20px;
            left: 520px;
            z-index: 5;
        }
        /* Scoreboard UI */
        #ui {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background: rgba(0, 0, 0, 0.75);
            color: white;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 20;
        }
        .info-text {
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        /* Jump Button Styling */
        #jumpBtn {
            width: 100%;
            height: 70px;
            margin-top: 15px;
            background: linear-gradient(135deg, #ff4757, #ff6b81);
            color: white;
            font-size: 24px;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 6px #cf3a46;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        #jumpBtn:active {
            box-shadow: 0 2px #cf3a46;
            transform: translateY(4px);
        }
        /* Jump Animation Settings */
        @keyframes jump {
            0% { bottom: 20px; }
            50% { bottom: 150px; }
            100% { bottom: 20px; }
        }
    </style>
</head>
<body>

    <div id="gameContainer">
        <div id="gameArea">
            <div id="ui">
                <div class="info-text">SCORE: <span id="score">0</span></div>
                <div class="info-text">SPEED: <span id="speedLvl">1.0x</span></div>
            </div>
            <div id="yousuf">🏃‍♂️</div>
            <div id="obstacle">🍌</div>
            <div id="floor"></div>
        </div>
        <button id="jumpBtn" onclick="jump()">JUMP</button>
    </div>

    <script>
        const yousuf = document.getElementById("yousuf");
        const obstacle = document.getElementById("obstacle");
        const scoreDisplay = document.getElementById("score");
        const speedDisplay = document.getElementById("speedLvl");

        let score = 0;
        let obstaclePosition = 500;
        let gameSpeed = 5; 
        let gameInterval;
        let isGameOver = false;

        function startGame() {
            gameInterval = setInterval(gameLoop, 20);
        }

        function gameLoop() {
            if (isGameOver) return;

            // Obstacle Movement Logic
            obstaclePosition -= gameSpeed;
            if (obstaclePosition < -40) {
                obstaclePosition = 500;
                score++;
                scoreDisplay.innerText = score;

                // Increase difficulty (speed) every 3 points
                if (score % 3 === 0) {
                    gameSpeed += 1.2;
                    speedDisplay.innerText = (gameSpeed / 5).toFixed(1) + "x";
                }
            }
            obstacle.style.left = obstaclePosition + "px";

            let yousufBottom = parseInt(window.getComputedStyle(yousuf).getPropertyValue("bottom"));
            
            // Collision Detection Setup
            if (obstaclePosition > 40 && obstaclePosition < 90 && yousufBottom <= 55) {
                isGameOver = true;
                clearInterval(gameInterval);
                
                // Keep your custom 'meow gop gop gop' alert text intact!
                alert("Game Over meow gop gop gop\nYour Score: " + score);
                resetGame();
            }
        }

        function jump() {
            if (isGameOver) return;
            if (!yousuf.classList.contains("jump-animation")) {
                yousuf.classList.add("jump-animation");
                setTimeout(function () {
                    yousuf.classList.remove("jump-animation");
                }, 550);
            }
        }

        // Spacebar key support for PC testing
        document.addEventListener("keydown", function (event) {
            if (event.code === "Space") {
                jump();
            }
        });

        // Reset the environment parameters
        function resetGame() {
            score = 0;
            gameSpeed = 5;
            obstaclePosition = 500;
            isGameOver = false;
            scoreDisplay.innerText = score;
            speedDisplay.innerText = "1.0x";
            obstacle.style.left = obstaclePosition + "px";
            startGame();
        }

        // Initialize the cycle
        startGame();
    </script>
</body>
</html>
