<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gop Gop Gop - Yousuf Edition</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }
        #gameContainer {
            position: relative;
            width: 100%;
            max-width: 600px;
            height: 430px; /* বাটনসহ সুন্দর জায়গার জন্য একটু বাড়ানো হলো */
            padding: 10px;
        }
        /* Background Image: gop.jpg */
        #gameArea {
            width: 100%;
            height: 320px;
            background-image: url('gop.jpg');
            background-size: cover;
            background-position: center;
            position: relative;
            overflow: hidden;
            border: 4px solid #fff;
            border-radius: 10px;
        }
        /* Main Character: yousuf.png (Updated to .png) */
        #yousuf {
            width: 60px;
            height: 60px;
            background-image: url('yousuf.png');
            background-size: cover;
            background-position: center;
            position: absolute;
            bottom: 10px;
            left: 50px;
            border-radius: 50%; 
            border: 2px solid white;
            z-index: 10;
        }
        .jump-animation {
            animation: jump 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }
        /* Obstacle: Banana Emoji */
        #obstacle {
            width: 40px;
            height: 40px;
            font-size: 35px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: absolute;
            bottom: 10px;
            left: 620px;
            z-index: 5;
        }
        /* UI and Scoreboard */
        #ui {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: rgba(0,0,0,0.6);
            color: white;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 20;
        }
        .info-text {
            font-size: 18px;
            font-weight: bold;
        }
        /* Mobile-friendly Jump Button */
        #jumpBtn {
            width: 100%;
            height: 65px;
            margin-top: 10px;
            background-color: #ff4757;
            color: white;
            font-size: 22px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 5px #ff2a3b;
            text-transform: uppercase;
        }
        #jumpBtn:active {
            box-shadow: 0 2px #ff2a3b;
            transform: translateY(3px);
        }
        /* Animations */
        @keyframes jump {
            0% { bottom: 10px; }
            50% { bottom: 140px; }
            100% { bottom: 10px; }
        }
    </style>
</head>
<body>

    <div id="gameContainer">
        <div id="gameArea">
            <div id="ui">
                <div class="info-text">Score: <span id="score">0</span></div>
                <div class="info-text">Speed: <span id="speedLvl">1x</span></div>
            </div>
            <div id="yousuf"></div>
            <div id="obstacle">🍌</div>
        </div>
        <button id="jumpBtn" onclick="jump()">JUMP</button>
    </div>

    <script>
        const yousuf = document.getElementById("yousuf");
        const obstacle = document.getElementById("obstacle");
        const scoreDisplay = document.getElementById("score");
        const speedDisplay = document.getElementById("speedLvl");

        let score = 0;
        let obstaclePosition = 600;
        let gameSpeed = 5; 
        let gameInterval;
        let isGameOver = false;

        function startGame() {
            gameInterval = setInterval(gameLoop, 20);
        }

        function gameLoop() {
            if (isGameOver) return;

            obstaclePosition -= gameSpeed;
            if (obstaclePosition < -40) {
                obstaclePosition = 600;
                score++;
                scoreDisplay.innerText = score;

                if (score % 5 === 0) {
                    gameSpeed += 1.5;
                    speedDisplay.innerText = (gameSpeed / 5).toFixed(1) + "x";
                }
            }
            obstacle.style.left = obstaclePosition + "px";

            let yousufBottom = parseInt(window.getComputedStyle(yousuf).getPropertyValue("bottom"));
            
            if (obstaclePosition > 50 && obstaclePosition < 100 && yousufBottom <= 50) {
                isGameOver = true;
                clearInterval(gameInterval);
                
                alert("Game Over meow gop gop gop\nYour Score: " + score);
                resetGame();
            }
        }

        function jump() {
            if (isGameOver) return;
            if (!yousuf.classList.contains("jump-animation")) {
                yousuf.classList.add("jump-animation");
                setTimeout(function () {
                    yousuf.classList.remove("jump-animation");
                }, 600);
            }
        }

        document.addEventListener("keydown", function (event) {
            if (event.code === "Space") {
                jump();
            }
        });

        function resetGame() {
            score = 0;
            gameSpeed = 5;
            obstaclePosition = 600;
            isGameOver = false;
            scoreDisplay.innerText = score;
            speedDisplay.innerText = "1x";
            obstacle.style.left = obstaclePosition + "px";
            startGame();
        }

        startGame();
    </script>
</body>
</html>
